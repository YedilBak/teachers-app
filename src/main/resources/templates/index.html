<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <div th:insert="links.html"></div>
</head>
<body>
<div th:insert="navbar.html"></div>

<div class="container">
    <table class="table table-striped mt-3">
        <thead>
        <tr>
            <th>ID</th>
            <th>FULL NAME</th>
            <th>CITY</th>
            <th>GPA</th>
            <th>PROFILE</th>
            <th>COMPANY</th>
            <th>DETAILS</th>
            <th>DELETE</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="teacher: ${teachers}">
            <td th:text="${teacher.id}"></td>
            <td th:text="${teacher.fullName}"></td>
            <td th:text="${teacher.city}"></td>
            <td th:text="${teacher.gpa}"></td>
            <td th:text="${teacher.profileTeacher.description}"></td>
            <td th:text="${teacher.company.name}"></td>
            <td style="width: 8%">  <a th:href="@{'/' + ${teacher.id}}" class="btn btn-secondary btn-sm">DETAILS</a> </td>
            <td style="width: 8%">
                <form action="/delete" method="post">
                    <input type="hidden" name="id" th:value="${teacher.id}">
                    <button class="btn btn-danger btn-sm">DELETE</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
